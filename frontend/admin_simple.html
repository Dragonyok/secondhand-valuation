<!DOCTYPE html>
<html>
<head>
    <title>Admin</title>
</head>
<body>
    <h1>Admin Panel</h1>
    <div id="result">Loading...</div>
    <script>
        async function load() {
            const res = await fetch('/admin/brands');
            const data = await res.json();
            document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }
        load();
    </script>
</body>
</html>

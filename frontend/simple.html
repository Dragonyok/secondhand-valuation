<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ประเมินมือสอง</title>
</head>
<body>
    <h1>📱 ประเมินราคามือสอง</h1>
    <input type="file" id="img" accept="image/*">
    <br><br>
    <select id="brand">
        <option value="iphone">iPhone</option>
        <option value="samsung">Samsung</option>
    </select>
    <select id="model">
        <option value="14">14</option>
        <option value="13">13</option>
    </select>
    <br><br>
    <button onclick="send()">ประเมิน</button>
    <pre id="result"></pre>

    <script>
        async function send() {
            const file = document.getElementById('img').files[0];
            if(!file) {
                alert('เลือกรูปก่อน');
                return;
            }
            const fd = new FormData();
            fd.append('file', file);
            fd.append('brand', document.getElementById('brand').value);
            fd.append('model', document.getElementById('model').value);
            fd.append('age_months', '12');
            fd.append('has_box', 'true');
            fd.append('has_charger', 'true');
            
            document.getElementById('result').innerText = 'กำลังวิเคราะห์...';
            
            try {
                const res = await fetch('http://localhost:8001/evaluate', {
                    method: 'POST',
                    body: fd
                });
                const data = await res.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
            } catch(e) {
                document.getElementById('result').innerText = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
